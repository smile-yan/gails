name: Cross-Compile Test

on:
  pull_request_review:
    types: [submitted]
    branches:
      - main
    paths:
      - 'gails/**'
      - '.github/workflows/cross-compile-test.yml'
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to test (optional, uses current branch if not specified)'
        required: false
        type: string

jobs:
  check_approval:
    name: Check PR Approval
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.review.state == 'approved'
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Check if PR is approved or manual dispatch
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual dispatch, proceeding with cross-compile tests"
          else
            echo "PR approved, proceeding with cross-compile tests"
          fi
          echo "approved=true" >> $GITHUB_OUTPUT

  cross_compile:
    name: Cross-Compile (${{ matrix.target_os }}/${{ matrix.target_arch }})
    needs: check_approval
    runs-on: ${{ matrix.runner }}
    if: needs.check_approval.outputs.approved == 'true'
    permissions:
      contents: read
      pull-requests: read
    env:
      GOWORK: "off"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_os: darwin
            target_arch: arm64
            runner: ubuntu-latest
          - target_os: darwin
            target_arch: amd64
            runner: ubuntu-latest
          - target_os: linux
            target_arch: arm64
            runner: ubuntu-24.04-arm  # Native ARM64 runner - much faster than QEMU
          - target_os: linux
            target_arch: amd64
            runner: ubuntu-latest
          - target_os: windows
            target_arch: arm64
            runner: ubuntu-latest
          - target_os: windows
            target_arch: amd64
            runner: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout PR (if specified)
        if: github.event_name == 'workflow_dispatch' && inputs.pr_number != ''
        run: gh pr checkout ${{ inputs.pr_number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: "gails/go.sum"

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libgtk-4-dev libwebkitgtk-6.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libwayland-dev build-essential pkg-config
          version: 1.0

      - name: Install Gails CLI
        working-directory: gails
        run: |
          go install ./cmd/gails
          gails version

      - name: Build and pack runtime
        run: |
          cd gails/internal/runtime/desktop/@gailsio/runtime
          npm ci
          npx --yes esbuild@latest --version
          npm run clean
          cd ${{ github.workspace }}/gails
          task runtime:build
          cd internal/runtime/desktop/@gailsio/runtime
          npm run build:code
          npm pack

      - name: Create test project
        run: |
          mkdir -p test-cross-compile
          cd test-cross-compile
          gails init -n crosstest -t vanilla
          cp ${{ github.workspace }}/gails/internal/runtime/desktop/@gailsio/runtime/*.tgz crosstest/frontend/
          cd crosstest/frontend
          RUNTIME_TGZ=$(ls *.tgz | xargs basename)
          npm pkg set dependencies.@gailsio/runtime="file:./$RUNTIME_TGZ"

      - name: Setup Docker cross-compile image
        working-directory: test-cross-compile/crosstest
        run: task common:setup:docker

      - name: Fix replace directive for Docker build
        working-directory: test-cross-compile/crosstest
        run: |
          # Change the replace directive to use absolute path that matches Docker mount
          go mod edit -dropreplace github.com/gailsapp/gails
          go mod edit -replace github.com/gailsapp/gails=${{ github.workspace }}/gails

      - name: Cross-compile for ${{ matrix.target_os }}/${{ matrix.target_arch }}
        working-directory: test-cross-compile/crosstest
        run: |
          echo "Cross-compiling for ${{ matrix.target_os }}/${{ matrix.target_arch }}..."
          task ${{ matrix.target_os }}:build ARCH=${{ matrix.target_arch }}
          echo "Cross-compilation successful!"
          ls -la bin/

  cross_compile_results:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    name: Cross-Compile Results
    needs: [cross_compile]
    steps:
      - run: |
          result="${{ needs.cross_compile.result }}"
          echo "Cross-compile result: $result"
          if [[ $result == "success" || $result == "skipped" ]]; then
            echo "Cross-compile tests passed (or were skipped)!"
            exit 0
          else
            echo "One or more cross-compile tests failed"
            exit 1
          fi
